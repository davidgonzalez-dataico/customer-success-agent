<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataico | Asesor Inteligente</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans"', 'sans-serif'], // App/Desktop/Body
                        body: ['Satoshi', 'sans-serif'],     // Botones y Labels
                        headline: ['Georgia', 'serif'],      // Fallback para Safiro
                    },
                    colors: {
                        coral: '#ED5650',
                        dark: '#333333',
                        success: '#2ECC71',
                        warning: '#F39C12',
                        appbg: '#F1F1F1'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Asegurar que los iconos se rendericen correctamente */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-appbg h-screen flex flex-col font-sans overflow-hidden text-[#333333]">

    <header
        class="bg-[#ED5650] px-8 py-4 flex items-center justify-between shrink-0 shadow-[0_8px_30px_rgb(0,0,0,0.04)] z-20">
        <div class="flex items-center gap-3">
            <img src="Dataico_logo.png" alt="Dataico" class="h-8 object-contain">
        </div>
        <span
            class="bg-white text-[#ED5650] font-body text-[12px] font-medium uppercase px-4 py-1.5 rounded-[200px] shadow-sm tracking-wider">
            Asesor AI
        </span>
    </header>

    <div class="flex-1 overflow-hidden flex w-full max-w-7xl mx-auto">

        <div <div
            class="flex-1 flex flex-col w-full bg-[#FFFFFF] relative shadow-[0_8px_30px_rgb(0,0,0,0.04)] border-r border-gray-100 rounded-[32px] my-6 ml-6 mr-6 overflow-hidden">
            <main id="chat-container" class="flex-1 overflow-y-auto p-6 md:p-10 flex flex-col gap-6">
            </main>

            <div class="bg-white border-t border-gray-100 p-6 shrink-0 shadow-[0_-8px_30px_rgb(0,0,0,0.02)] z-10">
                <div class="relative flex gap-4 w-full items-center">
                    <input type="text" id="user-input" placeholder="Escribe tu respuesta aquí..."
                        class="w-full bg-gray-50 border border-gray-200 rounded-[24px] pl-6 pr-4 h-[52px] font-sans text-[14px] text-[#333333] focus:outline-none focus:ring-1 focus:ring-[#ED5650] transition-all">
                    <button id="send-btn"
                        class="bg-[#333333] hover:bg-[#2A2A2A] text-white w-[52px] h-[52px] rounded-[200px] transition-colors flex items-center justify-center shrink-0 shadow-md">
                        <span class="material-symbols-outlined text-[20px]">send</span>
                    </button>
                </div>
            </div>
        </div>

        <aside class="hidden md:flex w-[380px] p-6 flex-col justify-start bg-transparent overflow-y-auto">
            <div id="dynamic-banner"
                class="bg-[#FFFFFF] rounded-[24px] p-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)] flex flex-col border border-gray-50 hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] transition-shadow sticky top-6">

                <div
                    class="w-12 h-12 rounded-[16px] bg-gray-50 border border-gray-100 flex items-center justify-center mb-6 shadow-inner">
                    <span class="material-symbols-outlined text-[#ED5650] text-[24px]">shopping_cart</span>
                </div>

                <h3 class="font-headline text-[24px] text-[#333333] font-medium mb-4">Recepción de Compras</h3>

                <p class="font-sans text-[14px] font-normal text-[#333333] mb-6 leading-relaxed">
                    Asegura tus deducciones de impuestos y soporta costos ante la DIAN de la manera más sencilla.
                </p>
                <p class="font-sans text-[14px] font-normal text-[#333333] leading-relaxed">
                    <strong class="font-bold">Beneficio:</strong> Nuestro Bot Auditor hace el trabajo pesado por ti:
                    revisa, audita e importa tus compras automáticamente.
                </p>

            </div>
        </aside>

    </div>

    <script src="app.js"></script>
</body>

</html>
